<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babel - Jogo</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

<header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <button
            onclick="history.back()"
            class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg hover:bg-gray-700"
        >
            ← Voltar
        </button>
    </div>
</header>


<main class="max-w-6xl mx-auto px-4 py-8">

    <div id="loading" class="text-center text-gray-400 py-12">
        Carregando...
    </div>


    <section id="game-container" class="hidden">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <div>
                <img
                    id="game-cover"
                    class="w-full rounded-xl shadow-lg border border-gray-800"
                >
            </div>


            <div class="md:col-span-2">

                <h1
                    id="game-name"
                    class="text-4xl font-bold mb-4"
                ></h1>


                <div
                    id="sources"
                    class="space-y-6"
                ></div>

            </div>

        </div>

    </section>

</main>


<script>

const API_BASE_URL = "http://127.0.0.1:3000";


const params = new URLSearchParams(window.location.search);

const gameName = params.get("name");
const coverId = params.get("cover");


const loading = document.getElementById("loading");
const container = document.getElementById("game-container");

const nameElement = document.getElementById("game-name");
const coverElement = document.getElementById("game-cover");
const sourcesElement = document.getElementById("sources");



function getCover(id) {

    if (!id)
        return "https://images.unsplash.com/photo-1538481199705-c710c4e965fc?q=80&w=400";

    return `https://images.igdb.com/igdb/image/upload/t_cover_big/${id}.webp`;
}



async function loadGame() {

    nameElement.textContent = gameName ?? "Jogo";

    coverElement.src = getCover(coverId);


    try {

        const response = await fetch(
            `${API_BASE_URL}/sources/search?q=${encodeURIComponent(gameName)}`
        );


        if (!response.ok)
            throw new Error();


        const sources = await response.json();


        renderSources(sources);


    } catch(error) {

        sourcesElement.innerHTML = `
            <div class="
                p-4
                rounded-xl
                bg-red-950/30
                border
                border-red-900
                text-red-400
            ">
                Erro ao buscar fontes.
            </div>
        `;

    }


    loading.classList.add("hidden");
    container.classList.remove("hidden");

}




function renderSources(sources) {


    if (!sources.length) {

        sourcesElement.innerHTML = `
            <div class="
                p-6
                rounded-xl
                bg-gray-900
                border
                border-gray-800
                text-gray-400
            ">
                Nenhuma versão encontrada.
            </div>
        `;

        return;
    }



    sourcesElement.innerHTML = sources.map(source => {


        return `

        <div
            class="
            bg-gray-900
            border
            border-gray-800
            rounded-xl
            p-5
            "
        >

            <h2 class="
                text-xl
                font-bold
                text-indigo-400
                mb-4
            ">
                ${source.name}
            </h2>



            <div class="space-y-3">

            ${
                source.downloads.map(download => {


                    return `

                    <div
                        class="
                        flex
                        items-center
                        justify-between
                        gap-4
                        bg-gray-800
                        rounded-lg
                        p-3
                        "
                    >

                        <span class="text-sm">
                            ${download.title}
                        </span>


                        <button

                            onclick="
                            openDownload('${download.uris?.[0] ?? ""}')
                            "

                            class="
                            px-3
                            py-1
                            bg-indigo-600
                            rounded-lg
                            hover:bg-indigo-500
                            text-sm
                            "
                        >
                            Abrir
                        </button>


                    </div>

                    `;


                }).join("")
            }

            </div>


        </div>


        `;


    }).join("");

}



function openDownload(url) {

    if (!url)
        return;


    window.open(url, "_blank");

}



loadGame();


</script>


</body>
</html>
